<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cream background square -->
  <rect width="512" height="512" rx="80" fill="#FAF6F0"/>
  <!-- Outer oval — thick bordeaux, clearly oval not circle -->
  <ellipse cx="256" cy="256" rx="238" ry="206" fill="#7B2535"/>
  <!-- Inner cream fill -->
  <ellipse cx="256" cy="256" rx="220" ry="188" fill="#FAF6F0"/>
  <!-- Inner thin decorative ring -->
  <ellipse cx="256" cy="256" rx="211" ry="179" fill="none" stroke="#7B2535" stroke-width="2.5"/>
  <!-- HOUSE — smaller, tracked -->
  <text x="256" y="224"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        font-weight="700"
        letter-spacing="9"
        fill="#1A1826"
        text-anchor="middle">HOUSE</text>
  <!-- MISTRAL — reduced to fit inside oval -->
  <text x="256" y="306"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="400"
        font-style="italic"
        fill="#1A1826"
        text-anchor="middle">MISTRAL</text>
</svg>
